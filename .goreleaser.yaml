version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: cli
    binary: mergeway-cli
    env:
      - CGO_ENABLED=0
    main: .
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/mergewayhq/mergeway-cli/internal/version.Number={{.Version}}
      - -X github.com/mergewayhq/mergeway-cli/internal/version.Commit={{.Commit}}
      - -X github.com/mergewayhq/mergeway-cli/internal/version.BuildDate={{.Date}}

dockers_v2:
  - id: container
    dockerfile: Dockerfile.goreleaser
    ids:
      - cli
    images:
      - ghcr.io/mergewayhq/mergeway-cli
    tags:
      - "{{ .Version }}"
      - "{{ if not .Prerelease }}latest{{ end }}"
    labels:
      org.opencontainers.image.created: "{{ .Date }}"
      org.opencontainers.image.description: "Command-line toolkit for file-backed metadata repositories."
      org.opencontainers.image.name: "{{ .ProjectName }}"
      org.opencontainers.image.revision: "{{ .FullCommit }}"
      org.opencontainers.image.source: "{{ .GitURL }}"
      org.opencontainers.image.title: "{{ .ProjectName }}"
      org.opencontainers.image.version: "{{ .Version }}"
    platforms:
      - linux/amd64
      - linux/arm64

archives:
  - format: tar.gz
    # this name template makes the OS and Arch compatible with the results of uname.
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    # use zip for windows archives
    format_overrides:
    - goos: windows
      format: zip

checksum:
  name_template: 'checksums.txt'

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
