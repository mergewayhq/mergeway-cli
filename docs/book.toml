[book]
title = "Mergeway Documentation"
description = "Developer and operator documentation for the Mergeway CLI."
authors = ["Mergeway Team"]
language = "en"
src = "src"

[build]
create-missing = false

[output.html]
default-theme = "light"
git-repository-url = "https://github.com/mergewayhq/mergeway-cli"
git-repository-icon = "fab-github"
site-url = "/"

[output.html.search]
enable = true

[preprocessor.yml-header]
enable = true

